{% extends "base.html" %}
{% block content %}
    <h2>Crear Cuenta</h2>
    <form method="POST">
        <input type="text" name="nombres" placeholder="Nombres" required>
        <input type="text" name="apellidos" placeholder="Apellidos" required>
        <input type="text" name="dni" placeholder="DNI (8 dígitos)" pattern="[0-9]{8}" title="Debe tener 8 dígitos" required>
        <input type="tel" name="celular" placeholder="Celular (9 dígitos)" pattern="[0-9]{9}" title="Debe tener 9 dígitos" required>
        <label style="display:block; text-align:left; color:#aaa; margin-top:10px; font-size: 0.9em;">Fecha de Nacimiento:</label>
        <input type="date" name="fecha_nacimiento" required>
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Registrarse</button>
    </form>
{% endblock %}
